<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crucible Agent</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --text: #eee;
      --text-muted: #999;
      --user-bg: #0f3460;
      --agent-bg: #1a1a2e;
      --tool-bg: #2a1a3e;
      --border: #333;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #333;
    }
    header .status.connected { background: #1b4332; color: #95d5b2; }
    header .status.disconnected { background: #3d0000; color: #ff6b6b; }
    .profile-select {
      margin-left: auto;
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }
    .msg.agent {
      align-self: flex-start;
      background: var(--agent-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.tool {
      align-self: flex-start;
      background: var(--tool-bg);
      border: 1px solid #4a2060;
      border-radius: 8px;
      font-size: 12px;
      max-width: 60%;
    }
    .msg.tool .label {
      font-size: 11px;
      color: #b088cc;
      margin-bottom: 4px;
    }
    .msg.system {
      align-self: center;
      color: var(--text-muted);
      font-size: 12px;
      font-style: italic;
    }
    .typing { opacity: 0.7; }
    .typing::after {
      content: '▊';
      animation: blink 0.7s infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    #input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    #input-area textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    #input-area textarea:focus { outline: none; border-color: var(--accent); }
    #input-area button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #input-area button:hover { opacity: 0.85; }
    #input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>⚗️ Crucible Agent</h1>
    <span id="status" class="status disconnected">切断</span>
    <select id="profile" class="profile-select">
      <option value="">プロファイルなし</option>
    </select>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" placeholder="メッセージを入力..." rows="1"></textarea>
    <button id="send" disabled>送信</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const profileEl = document.getElementById('profile');

    let ws = null;
    let currentAgentMsg = null;

    // プロファイル一覧を取得
    fetch('/profiles')
      .then(r => r.json())
      .then(data => {
        (data.profiles || []).forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.name;
          opt.textContent = p.name;
          profileEl.appendChild(opt);
        });
      })
      .catch(() => {});

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/agent/ws`);

      ws.onopen = () => {
        statusEl.textContent = '接続中';
        statusEl.className = 'status connected';
        sendBtn.disabled = false;
        addSystemMsg('エージェントに接続しました');
      };

      ws.onclose = () => {
        statusEl.textContent = '切断';
        statusEl.className = 'status disconnected';
        sendBtn.disabled = true;
        addSystemMsg('接続が切断されました。再接続中...');
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {};

      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        handleEvent(data);
      };
    }

    function handleEvent(data) {
      switch (data.type) {
        case 'text_delta':
          if (!currentAgentMsg) {
            currentAgentMsg = addMsg('', 'agent');
            currentAgentMsg.classList.add('typing');
          }
          currentAgentMsg.textContent += data.content;
          scrollToBottom();
          break;

        case 'tool_start':
          addToolMsg(`🔧 ${data.tool_name}`, JSON.stringify(data.input, null, 2));
          break;

        case 'tool_end':
          addToolMsg(`✅ ${data.tool_name} (${data.duration_ms}ms)`,
            JSON.stringify(data.output, null, 2));
          break;

        case 'done':
          if (currentAgentMsg) {
            currentAgentMsg.classList.remove('typing');
            currentAgentMsg = null;
          }
          sendBtn.disabled = false;
          inputEl.disabled = false;
          inputEl.focus();
          break;

        case 'error':
          addSystemMsg(`エラー: ${data.content}`);
          sendBtn.disabled = false;
          inputEl.disabled = false;
          break;
      }
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMsg(text, 'user');
      const payload = { type: 'message', content: text };
      const profile = profileEl.value;
      if (profile) payload.profile = profile;
      ws.send(JSON.stringify(payload));

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;
      inputEl.disabled = true;
      currentAgentMsg = null;
    }

    function addMsg(text, cls) {
      const el = document.createElement('div');
      el.className = `msg ${cls}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
      return el;
    }

    function addToolMsg(label, detail) {
      const el = document.createElement('div');
      el.className = 'msg tool';
      el.innerHTML = `<div class="label">${label}</div><code>${detail}</code>`;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function addSystemMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg system';
      el.textContent = text;
      messagesEl.appendChild(el);
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // テキストエリア自動リサイズ
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Enter で送信、Shift+Enter で改行
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);
    connect();
  </script>
</body>
</html>
